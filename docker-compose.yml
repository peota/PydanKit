services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    # Load the whole .env (provider keys, auth, memory, API config). Provider-agnostic:
    # whichever provider MODEL_NAME uses reads its own key from here. Unset values fall
    # back to the defaults in src/config.py. Marked optional so `docker compose build`
    # works before a .env exists.
    env_file:
      - path: .env
        required: false
    stdin_open: true
    tty: true
    # Override command for interactive mode
    command: ["interactive"]

  # API server + dashboard on http://localhost:8000 ("how do I serve via compose?")
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    # The image already defaults to `serve` (host 0.0.0.0, port 8000 unless $PORT is
    # set); stated explicitly so the intent is obvious and survives a CMD change.
    command: ["serve"]

  # Development container with source mounted
  agent-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./src:/app/src:ro
    env_file:
      - path: .env
        required: false
    # Force debug on for dev, regardless of .env (environment wins over env_file).
    environment:
      - DEBUG=true
    working_dir: /app
    command: ["python", "-m", "src.main", "interactive"]
    stdin_open: true
    tty: true
